name: Build Raw Image

on: 
  workflow_dispatch:
  push:
    branches:
      - "build_raw_image"

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Print env variables
        run: |
          echo "DOCKER_USER=$DOCKER_USER"
          echo "BUILDX_ENDPOINT=$BUILDX_ENDPOINT"
          
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER_H2KHANH }}
          password: ${{ secrets.DOCKER_PAT_H2KHANH }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: cloud
          endpoint: h2khanh/tips

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          file: ./Dockerfile
          tags: "h2khanh/tips_image:raw"
          push: true
