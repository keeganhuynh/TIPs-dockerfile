name: Mirror ECR to Docker Hub

on:
  push:
      branches:
        - "mirror_ecr_to_dockerhub"
  workflow_dispatch:
    inputs:
      ecr_repository:
        description: "ECR repository name"
        required: true
        default: "tips-dockerfile"
      image_tag:
        description: "Image tag"
        required: true
        default: "latest"
      dockerhub_repository:
        description: "Docker Hub repository name"
        required: true
        default: "tips-dockerfile"

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Install Skopeo
        run: |
          sudo apt-get update
          sudo apt-get install -y skopeo

      - name: Login to AWS ECR with Skopeo
        run: |
          aws ecr get-login-password --region ap-southeast-1 | \
          skopeo login --username AWS --password-stdin 668399498987.dkr.ecr.ap-southeast-1.amazonaws.com

      - name: Login to Docker Hub with Skopeo
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | \
          skopeo login --username "${{ vars.DOCKERHUB_USERNAME }}" --password-stdin docker.io

      - name: Mirror image from ECR to Docker Hub
        run: |
          SRC="docker://668399498987.dkr.ecr.ap-southeast-1.amazonaws.com/${{ inputs.ecr_repository }}:${{ inputs.image_tag }}"
          DST="docker://docker.io/${{ vars.DOCKERHUB_USERNAME }}/${{ inputs.dockerhub_repository }}:${{ inputs.image_tag }}"
          skopeo copy --all "$SRC" "$DST"

      - name: Show result
        run: |
          echo "Mirrored:"
          echo "668399498987.dkr.ecr.ap-southeast-1.amazonaws.com/${{ inputs.ecr_repository }}:${{ inputs.image_tag }}"
          echo "to"
          echo "${{ vars.DOCKERHUB_USERNAME }}/${{ inputs.dockerhub_repository }}:${{ inputs.image_tag }}"
